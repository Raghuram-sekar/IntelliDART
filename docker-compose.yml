version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14
    container_name: intellidart-db
    environment:
      POSTGRES_DB: intellidart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - intellidart-network

  # Redis (for caching and sessions)
  redis:
    image: redis:7-alpine
    container_name: intellidart-redis
    ports:
      - "6379:6379"
    networks:
      - intellidart-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intellidart-backend
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/intellidart
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
      - NODE_ENV=development
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - intellidart-network
    command: npm run dev

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intellidart-frontend
    environment:
      - REACT_APP_API_URL=http://localhost:3001
      - REACT_APP_AI_SERVICE_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - intellidart-network
    command: npm start

  # AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: intellidart-ai
    environment:
      - OPENAI_API_KEY=your-openai-api-key
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/intellidart
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    volumes:
      - ./ai-service:/app
    networks:
      - intellidart-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

networks:
  intellidart-network:
    driver: bridge 